<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --ink:#171225;
  --muted:#6f6881;
  --paper:#fffaf0;
  --white:#ffffff;
  --pink:#ff4fa3;
  --yellow:#ffe45c;
  --blue:#4ac7ff;
  --green:#60f09b;
  --purple:#8c6cff;
  --red:#ff6b6b;
  --shadow:6px 6px 0 var(--ink);
  --shadow-sm:3px 3px 0 var(--ink);
  --radius:22px;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink)}
body{
  background:
    radial-gradient(circle at 12% 10%, rgba(255,79,163,.32) 0 90px, transparent 92px),
    radial-gradient(circle at 90% 12%, rgba(74,199,255,.30) 0 120px, transparent 122px),
    radial-gradient(circle at 30% 88%, rgba(255,228,92,.38) 0 150px, transparent 152px),
    linear-gradient(135deg,#fff5fb 0%,#f4fbff 46%,#fff9df 100%);
}
button,input,select{font:inherit}
.app{
  width:min(980px,100%);
  margin:0 auto;
  padding:18px;
}
.hero{
  position:relative;
  overflow:hidden;
  border:4px solid var(--ink);
  border-radius:30px;
  background:var(--paper);
  box-shadow:var(--shadow);
  padding:22px;
}
.hero:before{
  content:"";
  position:absolute;
  inset:auto -30px -48px auto;
  width:180px;
  height:180px;
  background:repeating-linear-gradient(45deg,var(--yellow) 0 10px,var(--pink) 10px 20px);
  border:4px solid var(--ink);
  border-radius:50%;
  transform:rotate(-12deg);
  opacity:.9;
}
.hero h1{
  position:relative;
  margin:0 0 8px;
  font-size:clamp(28px,7vw,52px);
  line-height:1.05;
  letter-spacing:-.05em;
}
.hero p{
  position:relative;
  margin:0;
  max-width:680px;
  color:var(--muted);
  font-weight:800;
  line-height:1.65;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:3px solid var(--ink);
  background:var(--yellow);
  box-shadow:var(--shadow-sm);
  border-radius:999px;
  padding:7px 12px;
  font-size:14px;
  font-weight:1000;
  margin-bottom:14px;
}
.panel{
  margin-top:22px;
  border:4px solid var(--ink);
  border-radius:var(--radius);
  background:var(--white);
  box-shadow:var(--shadow);
  padding:18px;
}
.controls{
  display:grid;
  grid-template-columns:1.4fr .8fr;
  gap:12px;
  align-items:end;
}
@media(max-width:720px){
  .controls{grid-template-columns:1fr}
}
.field label{
  display:block;
  font-weight:1000;
  margin:0 0 7px;
}
.input,select{
  width:100%;
  min-height:54px;
  border:3px solid var(--ink);
  border-radius:16px;
  background:#fff;
  padding:12px 14px;
  font-weight:900;
  outline:none;
  box-shadow:var(--shadow-sm);
}
.input:focus,select:focus{
  box-shadow:0 0 0 4px rgba(74,199,255,.35), var(--shadow-sm);
}
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}
@media(max-width:560px){
  .actions{grid-template-columns:1fr}
}
.btn{
  min-height:58px;
  border:4px solid var(--ink);
  border-radius:18px;
  padding:12px 14px;
  font-weight:1000;
  cursor:pointer;
  color:var(--ink);
  box-shadow:var(--shadow-sm);
  transition:transform .08s ease, box-shadow .08s ease, filter .2s ease;
}
.btn:hover{filter:saturate(1.08)}
.btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}
.btn.primary{background:var(--pink);color:#fff}
.btn.secondary{background:var(--blue)}
.btn.ghost{background:var(--yellow)}
.btn.small{
  min-height:44px;
  border-width:3px;
  border-radius:14px;
  padding:8px 12px;
  font-size:14px;
}
.status{
  margin-top:14px;
  border:3px dashed var(--ink);
  border-radius:16px;
  padding:12px;
  background:#fff8c7;
  font-weight:900;
  color:#423713;
  line-height:1.6;
}
.status.error{background:#ffe3e3;color:#6b1111}
.status.ok{background:#ddffe9;color:#0d4b22}
.status.info{background:#e7f7ff;color:#073c57}
.hidden{display:none!important}
.section-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin:0 0 12px;
}
.section-title h2{
  margin:0;
  font-size:22px;
}
.bubbles{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:12px;
}
.bubble{
  border:4px solid var(--ink);
  border-radius:999px;
  background:#fff;
  box-shadow:var(--shadow-sm);
  padding:12px 15px;
  font-weight:1000;
  cursor:pointer;
  max-width:100%;
  display:flex;
  align-items:center;
  gap:9px;
  transition:transform .08s ease, box-shadow .08s ease;
}
.bubble:nth-child(4n+1){background:#ffd6eb}
.bubble:nth-child(4n+2){background:#d9f4ff}
.bubble:nth-child(4n+3){background:#fff0a8}
.bubble:nth-child(4n){background:#dcffe8}
.bubble:hover{transform:translateY(-2px)}
.bubble:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}
.bubble .dist{
  background:var(--ink);
  color:#fff;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
  white-space:nowrap;
}
.result{
  display:grid;
  gap:14px;
}
.store-head{
  border:4px solid var(--ink);
  border-radius:22px;
  background:linear-gradient(135deg,#fff 0%,#fff6c7 100%);
  box-shadow:var(--shadow-sm);
  padding:16px;
}
.store-head .store-name{
  margin:0;
  font-size:clamp(26px,7vw,42px);
  line-height:1.05;
  letter-spacing:-.04em;
}
.store-head .meta{
  margin-top:8px;
  color:var(--muted);
  font-weight:900;
  line-height:1.55;
}
.rank-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
@media(max-width:780px){
  .rank-grid{grid-template-columns:1fr}
}
.rank-card{
  border:4px solid var(--ink);
  border-radius:22px;
  background:#fff;
  box-shadow:var(--shadow-sm);
  padding:16px;
  min-height:140px;
}
.rank-card.r1{background:linear-gradient(135deg,#ffe45c,#fff6b3)}
.rank-card.r2{background:linear-gradient(135deg,#4ac7ff,#dcf6ff)}
.rank-card.r3{background:linear-gradient(135deg,#60f09b,#e3ffed)}
.rank-label{
  display:inline-block;
  border:3px solid var(--ink);
  border-radius:999px;
  background:#fff;
  padding:5px 10px;
  font-weight:1000;
  box-shadow:2px 2px 0 var(--ink);
  margin-bottom:10px;
}
.pay-name{
  font-size:21px;
  line-height:1.35;
  font-weight:1000;
}
.rank-card.r2 .pay-name,
.rank-card.r3 .pay-name{
  font-size:18px;
}
.note{
  border:4px solid var(--ink);
  border-radius:22px;
  background:#f1edff;
  box-shadow:var(--shadow-sm);
  padding:15px;
  font-weight:900;
  line-height:1.65;
}
.table-wrap{
  overflow:auto;
  border:4px solid var(--ink);
  border-radius:20px;
  box-shadow:var(--shadow-sm);
}
table{
  width:100%;
  border-collapse:collapse;
  min-width:760px;
  background:#fff;
}
th,td{
  border-bottom:2px solid var(--ink);
  border-right:2px solid var(--ink);
  padding:10px;
  text-align:left;
  vertical-align:top;
  font-weight:800;
}
th{
  background:var(--yellow);
  font-weight:1000;
  position:sticky;
  top:0;
}
tr:last-child td{border-bottom:0}
td:last-child,th:last-child{border-right:0}
.footer{
  margin:22px 0 8px;
  text-align:center;
  color:var(--muted);
  font-weight:800;
  line-height:1.6;
}
.kbd{
  display:inline-block;
  padding:2px 8px;
  border:2px solid var(--ink);
  border-radius:8px;
  background:#fff;
  box-shadow:2px 2px 0 var(--ink);
  font-weight:1000;
}
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="badge">💳 現在地 × 支払い最適化</div>
    <h1>いまのお店、<br>何で払う？</h1>
    <p>
      現在地から近くの対象店舗を探して、候補をバブル表示します。
      候補を選ぶと、そのお店のおすすめ支払い方法1〜3位をすぐ表示します。
    </p>
  </header>

  <section class="panel">
    <div class="controls">
      <div class="field">
        <label for="manualSearch">店舗名で検索</label>
        <input id="manualSearch" class="input" type="search" placeholder="例：セブン、マック、オーケー、タリーズ">
      </div>
      <div class="field">
        <label for="radiusSelect">現在地検索の半径</label>
        <select id="radiusSelect">
          <option value="120">120m：今いる建物付近</option>
          <option value="250" selected>250m：近くのお店</option>
          <option value="500">500m：駅前・商業施設向け</option>
          <option value="800">800m：広めに探す</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button id="geoBtn" class="btn primary">📍 現在地から探す</button>
      <button id="clearBtn" class="btn secondary">🧹 表示をクリア</button>
      <button id="listModeBtn" class="btn ghost">📚 登録店一覧モード</button>
    </div>

    <div id="status" class="status info">
      まずは <span class="kbd">現在地から探す</span> を押すか、店舗名を入力してください。
    </div>
  </section>

  <section id="candidatePanel" class="panel hidden">
    <div class="section-title">
      <h2>候補店舗</h2>
      <button id="showAllBtn" class="btn ghost small">全対象店舗を表示</button>
    </div>
    <div id="bubbles" class="bubbles"></div>
  </section>

  <section id="resultPanel" class="panel hidden">
    <div class="section-title">
      <h2>おすすめ支払い方法</h2>
      <button id="copyBtn" class="btn ghost small">結果をコピー</button>
    </div>
    <div id="result" class="result"></div>
  </section>

  <section id="allPanel" class="panel hidden">
    <div class="section-title">
      <h2>内蔵店舗データ</h2>
      <button id="hideAllBtn" class="btn secondary small">閉じる</button>
    </div>
    <div class="table-wrap">
      <table id="storeTable">
        <thead>
          <tr>
            <th>店舗</th>
            <th>1位</th>
            <th>2位</th>
            <th>3位</th>
            <th>備考</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <div class="footer">
    位置情報は端末内のブラウザ処理と周辺店舗検索にのみ使用します。<br>
    店舗候補はOpenStreetMapの登録状況に依存します。
  </div>
</div>

const OVERPASS_ENDPOINTS = [
  "https://overpass-api.de/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter"
];

const $ = (id) => document.getElementById(id);

let lastSelectedStore = null;

function candidateGroupKey(matchStore){
  return matchStore.store;
}

function normalizeText(value){
  return String(value || "")
    .normalize("NFKC")
    .toLowerCase()
    .replace(/[ー‐-‒–—―\-−\s　・･'’`]/g,"")
    .replace(/株式会社|有限会社|合同会社|店$/g,"")
    .trim();
}

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#039;"
  }[ch]));
}

function setStatus(message, type="info"){
  const el = $("status");
  el.className = "status " + type;
  el.innerHTML = message;
}

function show(el){
  el.classList.remove("hidden");
}

function hide(el){
  el.classList.add("hidden");
}

function haversineMeters(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const toRad = (deg) => deg * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function matchStoreFromText(text){
  const target = normalizeText(text);
  if(!target) return null;

  let best = null;

  for(const store of STORE_DATA){
    for(const alias of store.aliases){
      const a = normalizeText(alias);
      if(!a) continue;

      let score = 0;
      if(target === a){
        score = 100;
      }else if(target.includes(a)){
        score = 80;
      }else if(a.includes(target) && target.length >= 2){
        score = 55;
      }

      if(score > 0 && (!best || score > best.score)){
        best = { store, score, alias };
      }
    }
  }

  return best;
}

function readOsmName(tags){
  const parts = [
    tags.name,
    tags["name:ja"],
    tags.brand,
    tags.operator,
    tags.shop,
    tags.amenity
  ].filter(Boolean);

  return parts.join(" / ");
}

function buildOverpassQuery(lat,lng,radius){
  return `
[out:json][timeout:25];
(
  node(around:${radius},${lat},${lng})["name"];
  way(around:${radius},${lat},${lng})["name"];
  relation(around:${radius},${lat},${lng})["name"];
);
out center tags;
`.trim();
}

async function fetchOverpass(lat,lng,radius){
  const query = buildOverpassQuery(lat,lng,radius);
  let lastError = null;

  for(const endpoint of OVERPASS_ENDPOINTS){
    try{
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 14000);

      const res = await fetch(endpoint, {
        method:"POST",
        headers:{ "Content-Type":"text/plain;charset=UTF-8" },
        body:query,
        signal:controller.signal
      });

      clearTimeout(timer);

      if(!res.ok){
        throw new Error("Overpass API error: " + res.status);
      }

      return await res.json();
    }catch(err){
      lastError = err;
    }
  }

  throw lastError || new Error("周辺店舗データの取得に失敗しました。");
}

function buildCandidatesFromOsm(osmJson, currentLat, currentLng){
  const groups = new Map();
  const seen = new Set();

  for(const el of osmJson.elements || []){
    const tags = el.tags || {};
    const nameText = readOsmName(tags);
    const match = matchStoreFromText(nameText);

    if(!match) continue;

    const lat = typeof el.lat === "number" ? el.lat : el.center?.lat;
    const lng = typeof el.lon === "number" ? el.lon : el.center?.lon;

    if(typeof lat !== "number" || typeof lng !== "number") continue;

    const distance = Math.round(haversineMeters(currentLat, currentLng, lat, lng));
    const seenKey = `${el.type}-${el.id}-${match.store.store}`;

    if(seen.has(seenKey)) continue;
    seen.add(seenKey);

    const groupKey = candidateGroupKey(match.store);
    const osmName = tags.name || tags.brand || match.store.store;
    const item = { osmName, distance, lat, lng, score:match.score };

    if(!groups.has(groupKey)){
      groups.set(groupKey, {
        source:"geo",
        store:match.store,
        distance,
        lat,
        lng,
        score:match.score,
        matches:[item]
      });
    }else{
      const g = groups.get(groupKey);
      g.matches.push(item);
      if(distance < g.distance){
        g.distance = distance;
        g.lat = lat;
        g.lng = lng;
      }
      g.score = Math.max(g.score, match.score);
    }
  }

  const candidates = Array.from(groups.values()).map((g) => {
    g.matches.sort((a,b) => a.distance - b.distance);
    g.osmName = g.matches[0]?.osmName || g.store.store;
    g.brandCount = g.matches.length;
    return g;
  });

  candidates.sort((a,b) => {
    if(a.distance !== b.distance) return a.distance - b.distance;
    return b.score - a.score;
  });

  return candidates.slice(0, 18);
}

function renderCandidates(candidates, titlePrefix="候補"){
  const panel = $("candidatePanel");
  const bubbles = $("bubbles");

  bubbles.innerHTML = "";

  if(candidates.length === 0){
    hide(panel);
    return;
  }

  for(const c of candidates){
    const btn = document.createElement("button");
    btn.className = "bubble";
    btn.type = "button";

    const label = c.store.store;
    const extra = c.source === "geo"
      ? `<span class="dist">${escapeHtml(c.distance)}m${c.brandCount > 1 ? ` / ${c.brandCount}店舗` : ""}</span>`
      : `<span class="dist">手動</span>`;

    const osm = c.source === "geo" && c.osmName && c.osmName !== c.store.store
      ? `<small style="font-weight:900;color:#5a526d;">最寄り：${escapeHtml(c.osmName)}</small>`
      : "";

    btn.innerHTML = `<span>🏪 ${escapeHtml(label)} ${osm}</span>${extra}`;
    btn.addEventListener("click", () => renderPayment(c.store, c));
    bubbles.appendChild(btn);
  }

  show(panel);
}

function renderPayment(store, context=null){
  lastSelectedStore = store;

  const metaLines = [];

  if(context && context.source === "geo"){
    metaLines.push(`現在地から約${context.distance}m`);
    if(context.brandCount > 1){
      metaLines.push(`同ブランド候補：${context.brandCount}店舗`);
    }
    if(context.osmName && context.osmName !== store.store){
      metaLines.push(`地図上の名称：${context.osmName}`);
    }
  }

  const metaHtml = metaLines.length
    ? `<div class="meta">${metaLines.map(escapeHtml).join("<br>")}</div>`
    : `<div class="meta">手入力または一覧から選択</div>`;

  $("result").innerHTML = `
    <div class="store-head">
      <h3 class="store-name">${escapeHtml(store.store)}</h3>
      ${metaHtml}
    </div>

    <div class="rank-grid">
      <div class="rank-card r1">
        <div class="rank-label">🥇 1位</div>
        <div class="pay-name">${escapeHtml(store.first)}</div>
      </div>
      <div class="rank-card r2">
        <div class="rank-label">🥈 2位</div>
        <div class="pay-name">${escapeHtml(store.second)}</div>
      </div>
      <div class="rank-card r3">
        <div class="rank-label">🥉 3位</div>
        <div class="pay-name">${escapeHtml(store.third)}</div>
      </div>
    </div>

    <div class="note">
      <strong>備考：</strong>${escapeHtml(store.note)}
    </div>
  `;

  show($("resultPanel"));
  $("resultPanel").scrollIntoView({behavior:"smooth", block:"start"});
}

function searchManual(keyword){
  const q = normalizeText(keyword);
  if(!q){
    return [];
  }

  const results = [];

  for(const store of STORE_DATA){
    const haystack = normalizeText([
      store.store,
      ...store.aliases,
      store.first,
      store.second,
      store.third,
      store.note
    ].join(" "));

    if(haystack.includes(q)){
      results.push({source:"manual", store});
    }
  }

  return results;
}

async function handleGeoSearch(){
  if(!("geolocation" in navigator)){
    setStatus("このブラウザは位置情報取得に対応していません。店舗名検索を使ってください。", "error");
    return;
  }

  const radius = Number($("radiusSelect").value || 250);

  setStatus("📍 位置情報を取得中です。ブラウザの許可ダイアログが出たら許可してください。", "info");

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const accuracy = Math.round(pos.coords.accuracy || 0);

      try{
        setStatus(`📡 現在地を取得しました。精度は約${accuracy}mです。周辺${radius}mの対象店舗を探しています。`, "info");

        const osmJson = await fetchOverpass(lat, lng, radius);
        const candidates = buildCandidatesFromOsm(osmJson, lat, lng);

        if(candidates.length === 0){
          setStatus(
            `近くに対象店舗候補が見つかりませんでした。<br>
             OpenStreetMapに店舗名が登録されていない場合があります。店舗名検索を使ってください。`,
            "error"
          );
          hide($("candidatePanel"));
          return;
        }

        setStatus(`✅ ${candidates.length}件の候補を見つけました。今いるお店を選んでください。`, "ok");
        renderCandidates(candidates, "現在地候補");
      }catch(err){
        setStatus(
          `周辺店舗データの取得に失敗しました。<br>
           店舗名検索はそのまま使えます。<br>
           詳細：${escapeHtml(err.message || err)}`,
          "error"
        );
      }
    },
    (err) => {
      let message = "位置情報を取得できませんでした。";

      if(err.code === 1){
        message = "位置情報の許可が拒否されました。ブラウザ設定で位置情報を許可するか、店舗名検索を使ってください。";
      }else if(err.code === 2){
        message = "現在地を特定できませんでした。屋内や地下では失敗することがあります。";
      }else if(err.code === 3){
        message = "位置情報取得がタイムアウトしました。もう一度試すか、店舗名検索を使ってください。";
      }

      setStatus(message, "error");
    },
    {
      enableHighAccuracy:true,
      timeout:12000,
      maximumAge:30000
    }
  );
}

  const tbody = $("storeTable").querySelector("tbody");
  tbody.innerHTML = STORE_DATA.map(store => `
    <tr>
      <td>${escapeHtml(store.store)}</td>
      <td>${escapeHtml(store.first)}</td>
      <td>${escapeHtml(store.second)}</td>
      <td>${escapeHtml(store.third)}</td>
      <td>${escapeHtml(store.note)}</td>
    </tr>
  `).join("");
}

function clearView(){
  $("manualSearch").value = "";
  hide($("candidatePanel"));
  hide($("resultPanel"));
  hide($("allPanel"));
  lastSelectedStore = null;
  setStatus("表示をクリアしました。現在地検索または店舗名検索を使ってください。", "info");
}

async function copyResult(){
  if(!lastSelectedStore){
    setStatus("コピーする結果がありません。先に店舗を選んでください。", "error");
    return;
  }

  const text = [
    `店舗：${lastSelectedStore.store}`,
    `1位：${lastSelectedStore.first}`,
    `2位：${lastSelectedStore.second}`,
    `3位：${lastSelectedStore.third}`,
    `備考：${lastSelectedStore.note}`
  ].join("\n");

  try{
    await navigator.clipboard.writeText(text);
    setStatus("結果をコピーしました。", "ok");
  }catch(err){
    setStatus("コピーに失敗しました。ブラウザの制限により使えない場合があります。", "error");
  }
}

function setupEvents(){
  $("geoBtn").addEventListener("click", handleGeoSearch);
  $("clearBtn").addEventListener("click", clearView);
  $("copyBtn").addEventListener("click", copyResult);
  $("listModeBtn").addEventListener("click", () => {
    renderAllTable();
    hide($("candidatePanel"));
    hide($("resultPanel"));
    show($("allPanel"));
    setStatus("📚 登録されている店舗一覧モードです。", "info");
    $("allPanel").scrollIntoView({behavior:"smooth", block:"start"});
  });

  $("manualSearch").addEventListener("input", (e) => {
    const keyword = e.target.value;
    const results = searchManual(keyword);

    if(!keyword.trim()){
      hide($("candidatePanel"));
      setStatus("店舗名を入力するか、現在地から探してください。", "info");
      return;
    }

    if(results.length === 0){
      hide($("candidatePanel"));
      setStatus("該当する店舗が見つかりません。別名や短い名前で検索してみてください。例：マック、セブン、オーケー", "error");
      return;
    }

    setStatus(`🔎 ${results.length}件見つかりました。候補を選んでください。`, "ok");
    renderCandidates(results, "検索候補");
  });

  $("showAllBtn").addEventListener("click", () => {
    renderAllTable();
    show($("allPanel"));
    $("allPanel").scrollIntoView({behavior:"smooth", block:"start"});
  });

  $("hideAllBtn").addEventListener("click", () => {
    hide($("allPanel"));
  });
}

setupEvents();
renderAllTable();
